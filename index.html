<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Suivi Sport-Études — Gacé</title>
<style>
  :root {
    --noir: #1A1A1A;
    --rouge: #B3202C;
    --or: #D4AF37;
    --or-clair: #FDF6E3;
    --or-bord: #F0DEB0;
    --bg: #f7f8f4;
    --texte: #334036;
    --gris: #8b9186;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e9eae6;
    color: var(--texte);
  }
  #shell {
    max-width: 440px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .header {
    background: var(--noir);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header .title { font-weight: 800; font-size: 15px; }
  .header .sub { font-size: 11px; color: var(--or); }
  .btn {
    display: inline-block;
    text-align: center;
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    letter-spacing: 0.2px;
    text-decoration: none;
  }
  .btn-block { width: 100%; }
  .btn-accent { background: var(--rouge); color: #fff; }
  .btn-primary { background: var(--noir); color: #fff; }
  .btn-ghost { background: transparent; color: var(--noir); border: 1px solid var(--noir); }
  .btn-danger { background: transparent; color: #B3412E; border: 1px solid #e3b3aa; }
  .btn-header {
    border: 1px solid var(--rouge); background: transparent; color: #fff;
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .card {
    background: #fff;
    border: 1px solid #e3e7de;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card-dark { background: var(--noir); color: #fff; }
  .card-gold { background: var(--or-clair); border: 1px solid var(--or-bord); }
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.4px; color: var(--gris); margin-bottom: 4px;
  }
  input[type=text], input[type=date], input[type=time], input[type=password],
  input[type=email], input[type=number], select, textarea {
    width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 8px;
    border: 1px solid #d7dcd3; font-size: 15px; font-family: inherit; background: #fff; color: #1C2620;
  }
  textarea { resize: vertical; min-height: 55px; }
  .voice-wrap { position: relative; }
  .voice-wrap textarea { padding-right: 42px; }
  .mic-btn {
    position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%;
    border: none; cursor: pointer; background: var(--or-bord); color: var(--noir); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .mic-btn.listening { background: var(--rouge); color: #fff; animation: pulse 1.2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(179,32,44,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(179,32,44,0); }
    100% { box-shadow: 0 0 0 0 rgba(179,32,44,0); }
  }
  .tabbar {
    position: sticky; bottom: 0; display: flex; background: #fff; border-top: 1px solid #e3e7de;
    overflow-x: auto;
  }
  .tabbar button {
    flex: 0 0 auto; min-width: 64px; padding: 10px 6px; border: none; background: transparent;
    color: var(--gris); font-weight: 500; font-size: 10.5px; cursor: pointer;
  }
  .tabbar button.active { background: var(--or-clair); color: var(--noir); font-weight: 700; }
  .tabbar button .icon { font-size: 16px; margin-bottom: 2px; display: block; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .pill-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; flex-wrap: wrap; }
  .pill {
    flex: 0 0 auto; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
    border: 1px solid #d7dcd3; background: #fff; color: var(--noir); cursor: pointer; white-space: nowrap;
  }
  .pill.active { border: 2px solid var(--rouge); background: var(--or-clair); }
  .offline-banner {
    background: #fbe7e4; color: #a33323; font-size: 12px; padding: 8px 14px; text-align: center; font-weight: 700;
  }
  .sync-banner {
    background: #eef6ec; color: #2b6b1f; font-size: 12px; padding: 6px 14px; text-align: center;
  }
  .empty { text-align: center; color: var(--gris); font-size: 14px; padding: 24px 10px; }
  .mini-row { margin-bottom: 6px; font-size: 14px; }
  .mini-row b { font-size: 12px; font-weight: 700; color: #5b6b5f; }
  a { color: var(--rouge); }
  .center { text-align: center; }
  .logo-header { text-align: center; padding: 36px 20px 20px; }
  .logo-header .emoji { font-size: 34px; }
  .logo-header .app-title { font-size: 19px; font-weight: 800; color: var(--noir); letter-spacing: 0.3px; margin-top: 6px; }
  .logo-header .app-sub { font-size: 12px; color: var(--gris); margin-top: 2px; }
  .scale-row { display: flex; gap: 6px; }
  .scale-btn {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
    border: 1px solid #d7dcd3; background: #fff; color: var(--noir);
  }
  .scale-btn.active { border: 2px solid var(--rouge); background: var(--or-clair); }
  .grade-btn {
    width: 36px; height: 36px; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer;
  }
</style>
</head>

var SYNC_URL = "https://script.google.com/macros/s/AKfycbwIIlMNk2F2cql8y18g0gwRubWWVZPsC2Jyd6CJI-L1uCDmu4mVbm0eimlAlzbF3--dpA/exec";

/* ============ STOCKAGE LOCAL + SYNCHRO ============ */
var syncQueue = JSON.parse(localStorage.getItem("sef-sync-queue") || "[]");
function saveQueue() { localStorage.setItem("sef-sync-queue", JSON.stringify(syncQueue)); }

var Storage = {
  get: function (key) {
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  },
  set: function (key, value) {
    localStorage.setItem(key, JSON.stringify(value));
    if (SYNC_URL) {
      syncQueue = syncQueue.filter(function (q) { return q.key !== key; });
      syncQueue.push({ key: key, value: value, ts: Date.now() });
      saveQueue();
      flushQueueSoon();
    }
  },
};

var flushTimer = null;
function flushQueueSoon() {
  if (flushTimer) return;
  flushTimer = setTimeout(function () { flushTimer = null; flushQueue(); }, 200);
}

function flushQueue() {
  if (!SYNC_URL || !navigator.onLine || syncQueue.length === 0) return;
  var item = syncQueue[0];
  fetch(SYNC_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ key: item.key, value: item.value }),
  })
    .then(function (r) { return r.json(); })
    .then(function () {
      syncQueue.shift();
      saveQueue();
      updateSyncBadge();
      if (syncQueue.length > 0) flushQueueSoon();
    })
    .catch(function () {
      updateSyncBadge();
    });
}

function pullFromRemote(key) {
  if (!SYNC_URL || !navigator.onLine) return Promise.resolve(null);
  return fetch(SYNC_URL + "?key=" + encodeURIComponent(key))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data && data.value !== undefined && data.value !== null) {
        var hasPending = syncQueue.some(function (q) { return q.key === key; });
        if (!hasPending) {
          localStorage.setItem(key, JSON.stringify(data.value));
          return data.value;
        }
      }
      return null;
    })
    .catch(function () { return null; });
}

function pullAllFromRemote() {
  if (!SYNC_URL || !navigator.onLine) return Promise.resolve({ changed: false, remoteKeys: [] });
  return fetch(SYNC_URL)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data || !data.all) return { changed: false, remoteKeys: [] };
      var pendingKeys = {};
      syncQueue.forEach(function (q) { pendingKeys[q.key] = true; });
      var changed = false;
      var remoteKeys = Object.keys(data.all);
      remoteKeys.forEach(function (k) {
        if (!pendingKeys[k]) {
          localStorage.setItem(k, JSON.stringify(data.all[k]));
          changed = true;
        }
      });
      return { changed: changed, remoteKeys: remoteKeys };
    })
    .catch(function () { return { changed: false, remoteKeys: [] }; });
}

function syncOnLoad() {
  return pullAllFromRemote().then(function (result) {
    if (result.changed) {
      players = Storage.get("sef-players-v1") || players;
      info = Storage.get("sef-info-v1") || info;
      matches = Storage.get("sef-matches-v1") || matches;
    }
    runMigrationsAndEnsure();
    // Premier lancement absolu : si le serveur ne connaissait pas encore ces clés
    // de base, on les envoie maintenant pour que les autres appareils les trouvent.
    var known = {};
    result.remoteKeys.forEach(function (k) { known[k] = true; });
    if (!known["sef-players-v1"]) Storage.set("sef-players-v1", players);
    if (!known["sef-info-v1"]) Storage.set("sef-info-v1", info);
    if (!known["sef-matches-v1"]) Storage.set("sef-matches-v1", matches);
    render();
  });
}

window.addEventListener("online", function () { flushQueue(); syncOnLoad(); });
window.addEventListener("offline", function () { render(); });

function periodicSync() {
  if (!SYNC_URL || !navigator.onLine) return;
  pullAllFromRemote().then(function (result) {
    if (result.changed) {
      players = Storage.get("sef-players-v1") || players;
      info = Storage.get("sef-info-v1") || info;
      matches = Storage.get("sef-matches-v1") || matches;
      render();
    }
  });
}
setInterval(periodicSync, 30000);

function manualRefresh() {
  var btn = document.getElementById("refresh-btn");
  if (btn) btn.textContent = "⏳";
  if (!SYNC_URL) {
    if (btn) setTimeout(function () { btn.textContent = "🔄"; }, 600);
    return;
  }
  if (!navigator.onLine) {
    if (btn) setTimeout(function () { btn.textContent = "🔄"; }, 600);
    return;
  }
  pullAllFromRemote().then(function (result) {
    if (result.changed) {
      players = Storage.get("sef-players-v1") || players;
      info = Storage.get("sef-info-v1") || info;
      matches = Storage.get("sef-matches-v1") || matches;
    }
    render();
  });
}
function refreshButtonHtml() {
  if (!SYNC_URL) return "";
  return '<button id="refresh-btn" onclick="manualRefresh()" title="Actualiser" style="border:1px solid var(--rouge);background:transparent;color:#fff;border-radius:8px;width:32px;height:32px;font-size:14px;cursor:pointer;margin-right:6px">🔄</button>';
}

function updateSyncBadge() {
  var b = document.getElementById("sync-badge");
  if (b) b.textContent = syncQueue.length > 0 ? "⏳ " + syncQueue.length + " en attente d'envoi" : "";
}

/* ============ HELPERS ============ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function pad2(n) { return String(n).padStart(2, "0"); }
function todayIso() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
var MOIS_FR = ["janv.", "févr.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];
var MOIS_LONG = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
var JOURS_LETTRE = ["L", "M", "M", "J", "V", "S", "D"];
function fmtShort(iso) {
  if (!iso) return "";
  var p = iso.split("-");
  var d = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
  return d.getUTCDate() + " " + MOIS_FR[d.getUTCMonth()];
}
function addDaysIso(iso, n) {
  var p = iso.split("-");
  var d = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
  d.setUTCDate(d.getUTCDate() + n);
  return d.getUTCFullYear() + "-" + pad2(d.getUTCMonth() + 1) + "-" + pad2(d.getUTCDate());
}
function mondayOf(iso) {
  var p = iso.split("-");
  var d = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
  var day = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - day);
  return d.getUTCFullYear() + "-" + pad2(d.getUTCMonth() + 1) + "-" + pad2(d.getUTCDate());
}
function sundayOf(iso) { return addDaysIso(mondayOf(iso), 6); }
function weekdayOfIso(iso) {
  var p = iso.split("-");
  return new Date(Date.UTC(+p[0], +p[1] - 1, +p[2])).getUTCDay(); // 0=dim...6=sam
}
function stripAccents(s) { return (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }
function cleanNamePart(s) { return stripAccents(s || "").replace(/[^a-zA-Z]/g, ""); }
function randomDigits4() { return String(Math.floor(Math.random() * 10000)).padStart(4, "0"); }
function generateCode(name) {
  var base = cleanNamePart(name);
  var nice = base.charAt(0).toUpperCase() + base.slice(1).toLowerCase();
  return nice + randomDigits4();
}
function byNomPrenom(a, b) {
  return a.nom.localeCompare(b.nom, "fr") || a.prenom.localeCompare(b.prenom, "fr");
}
function latestOf(list) {
  if (!list || list.length === 0) return null;
  var s = list.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
  return s[0];
}

function migratePlayers() {
  var changed = false;
  players.forEach(function (pl) {
    var known = ROSTER_INFO[pl.prenom + " " + pl.nom];
    if (!known) return;
    if (!pl.club && known.club) { pl.club = known.club; changed = true; }
    if (!pl.classe && known.classe) { pl.classe = known.classe; changed = true; }
    if (!pl.dateNaissance && known.dateNaissance) { pl.dateNaissance = known.dateNaissance; changed = true; }
    if (!pl.telPerso && known.telPerso) { pl.telPerso = known.telPerso; changed = true; }
    if (!pl.telParents && known.telParents) { pl.telParents = known.telParents; changed = true; }
    if (!pl.email && known.email) { pl.email = known.email; changed = true; }
  });
  if (changed) Storage.set("sef-players-v1", players);
}

function ensureClubCodes() {

var SpeechCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
var activeRecognition = null;
function micHtml(fieldName) {
  if (!SpeechCtor) return "";
  return '<button type="button" class="mic-btn" id="mic-' + fieldName + '" onclick="toggleMic(\'' + fieldName + '\')" title="Dicter avec le micro">🎤</button>';
}
function toggleMic(fieldName) {
  var ta = document.getElementById("f-" + fieldName);
  var btn = document.getElementById("mic-" + fieldName);
  if (!ta) return;
  if (activeRecognition && activeRecognition._field === fieldName) {
    activeRecognition.stop();
    return;
  }
  if (activeRecognition) activeRecognition.stop();
  var rec = new SpeechCtor();
  rec._field = fieldName;
  rec.lang = "fr-FR";
  rec.continuous = true;
  rec.interimResults = true;
  var base = ta.value || "";
  rec.onresult = function (event) {
    var finalT = "", interim = "";
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalT += t; else interim += t;
    }
    if (finalT) base = (base ? base + " " : "") + finalT.trim();
    ta.value = base + (interim ? " " + interim : "");
    ta.dispatchEvent(new Event("input", { bubbles: true }));
  };
  rec.onend = function () { if (btn) btn.classList.remove("listening"); activeRecognition = null; };
  rec.onerror = function () { if (btn) btn.classList.remove("listening"); activeRecognition = null; };
  activeRecognition = rec;
  rec.start();
  if (btn) btn.classList.add("listening");
}
function voiceTextarea(fieldName, value, placeholder, extraAttrs) {
  return '<div class="voice-wrap"><textarea id="f-' + fieldName + '" ' + (extraAttrs || "") +
    ' placeholder="' + esc(placeholder || "") + '" oninput="draftSet(\'' + fieldName + '\', this.value)">' + esc(value) + '</textarea>' +
    micHtml(fieldName) + '</div>';
}

function buildFullCalendar() {
  var start = SCHOOL_WEEKS[0][0], end = SCHOOL_WEEKS[SCHOOL_WEEKS.length - 1][1];
  var byDate = {};
  (info.programmation || []).forEach(function (e) { byDate[e.date] = e; });
  var days = [], currentTheme = "", d = start, safety = 0;
  while (d <= end && safety < 400) {
    if (byDate[d] && byDate[d].theme) currentTheme = byDate[d].theme;
    days.push({ date: d, theme: currentTheme, evenement: (byDate[d] && byDate[d].evenement) || "", heure: (byDate[d] && byDate[d].heure) || "" });
    d = addDaysIso(d, 1);
    safety++;
  }
  return days;
}
function groupByMonth(days) {
  var groups = [], cur = null;
  days.forEach(function (day) {
    var p = day.date.split("-");
    var key = p[0] + "-" + p[1];
    if (!cur || cur.key !== key) { cur = { key: key, year: +p[0], month: +p[1] - 1, days: [] }; groups.push(cur); }
    cur.days.push(day);
  });
  return groups;
}

function uploadDocFile(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var statusEl = document.getElementById("doc-upload-status");
  if (!navigator.onLine) {
    statusEl.textContent = "⚠️ Il faut être en ligne pour déposer un fichier.";
    return;
  }
  var MAX_SIZE = 8 * 1024 * 1024;
  if (file.size > MAX_SIZE) {
    statusEl.textContent = "⚠️ Fichier trop volumineux (8 Mo maximum).";
    return;
  }
  statusEl.textContent = "⏳ Envoi en cours...";
  var reader = new FileReader();
  reader.onload = function () {
    var base64Data = reader.result.split(",")[1];
    fetch(SYNC_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "uploadFile", filename: file.name, mimeType: file.type || "application/octet-stream", base64Data: base64Data }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data && data.ok) {
          var link = data.viewUrl || data.url;
          draft.lien = link;
          statusEl.innerHTML = "✅ " + esc(file.name) + ' déposé — <a href="' + esc(link) + '" target="_blank">voir le lien</a>';
          var lienInput = document.getElementById("f-lien");
          if (lienInput) lienInput.value = link;
        } else {
          statusEl.textContent = "⚠️ Échec de l'envoi. Réessaie.";
        }
      })
      .catch(function () { statusEl.textContent = "⚠️ Échec de l'envoi (connexion). Réessaie."; });
  };
  reader.readAsDataURL(file);
}
function startDocEdit(id) {

function parseFlexDate(str) {
  str = (str || "").trim();
  if (!str) return "";
  var m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return m[1] + "-" + pad2(+m[2]) + "-" + pad2(+m[3]);
  m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) return m[3] + "-" + pad2(+m[2]) + "-" + pad2(+m[1]);
  return "";
}
function parsePastedRows(text) {
  return text.split(/\r?\n/).map(function (line) { return line.trim(); }).filter(Boolean).map(function (line) {
    return line.split("\t").length > 1 ? line.split("\t") : line.split(";");
  });
}

function runImportJoueurs() {
  var rows = parsePastedRows(App.importText || "");
  var created = 0, updated = 0;
  rows.forEach(function (cols) {
    var nom = (cols[0] || "").trim();
    var prenom = (cols[1] || "").trim();
    if (!nom || !prenom) return;
    var groupe = (cols[2] || "").trim();
    var classe = (cols[3] || "").trim();
    var poste = (cols[4] || "").trim();
    var club = (cols[5] || "").trim();
    var entraineur = (cols[6] || "").trim();
    var telEntraineur = (cols[7] || "").trim();
    var telPerso = (cols[8] || "").trim();
    var telParents = (cols[9] || "").trim();
    var email = (cols[10] || "").trim();
    var dateNaissance = parseFlexDate(cols[11] || "");

    var existing = players.find(function (p) { return p.nom.toLowerCase() === nom.toLowerCase() && p.prenom.toLowerCase() === prenom.toLowerCase(); });
    if (existing) {
      if (groupe) existing.groupe = groupe;
      if (classe) existing.classe = classe;
      if (poste) existing.poste = poste;
      if (club) existing.club = club;
      if (entraineur) existing.entraineur = entraineur;
      if (telEntraineur) existing.telEntraineur = telEntraineur;
      if (telPerso) existing.telPerso = telPerso;
      if (telParents) existing.telParents = telParents;
      if (email) existing.email = email;
      if (dateNaissance) existing.dateNaissance = dateNaissance;
      updated++;
    } else {
      players.push({
        id: "p" + uid(), nom: nom, prenom: prenom, groupe: groupe || "Groupe 1",
        classe: classe, poste: poste, club: club, entraineur: entraineur,
        telEntraineur: telEntraineur, telPerso: telPerso, telParents: telParents,
        email: email, dateNaissance: dateNaissance, code: generateCode(prenom),
      });
      created++;
    }
  });
  savePlayers();
  ensureClubCodes();
  ensureWeeks();
  App.importResult = created + " joueur(s) créé(s), " + updated + " joueur(s) mis à jour.";
  render();
}

function runImportPlanning() {
  var rows = parsePastedRows(App.importText || "");
  var created = 0, updated = 0;
  rows.forEach(function (cols) {
    var date = parseFlexDate(cols[0] || "");
    if (!date) return;
    var heure = (cols[1] || "").trim();
    var theme = (cols[2] || "").trim();
    var evenement = (cols[3] || "").trim();
    var existing = info.programmation.find(function (e) { return e.date === date; });
    if (existing) {
      if (heure) existing.heure = heure;
      if (theme) existing.theme = theme;
      if (evenement) existing.evenement = evenement;
      updated++;
    } else {
      info.programmation.push({ id: uid(), date: date, heure: heure, theme: theme, evenement: evenement });
      created++;
    }
  });
  saveInfo();
  App.importResult = created + " événement(s) créé(s), " + updated + " événement(s) mis à jour.";
  render();
}

    '<div class="logo-header">' +
      '<img src="' + LOGO_B64 + '" style="width:64px;height:auto;display:inline-block" alt="Logo Section Excellence Sportive Gace">' +
      '<div class="app-title">SUIVI SPORT-ÉTUDES</div>' +
      '<div class="app-sub">Collège Jean Moulin — Gacé</div>' +
    '</div>' +
    '<div style="padding:0 24px 30px">' +
      '<div class="row" style="margin-bottom:18px">' +
        '<button class="pill ' + (App.roleChoice === "joueur" ? "active" : "") + '" style="flex:1" onclick="setRoleChoice(\'joueur\')">Joueur</button>' +
        '<button class="pill ' + (App.roleChoice === "entraineur" ? "active" : "") + '" style="flex:1" onclick="setRoleChoice(\'entraineur\')">Éducateur</button>' +
      '</div>' +
      '<div class="field"><label>Code d\'accès (joueur, ou code club pour un éducateur)</label>' +
        '<input type="text" id="code-input" style="text-transform:uppercase;letter-spacing:1px" placeholder="Ex : Arnold1234 ou Argentan5678" value="' + esc(App.code) + '" oninput="App.code=this.value">' +
      '</div>' +
      (App.error ? '<div style="color:#B3412E;font-size:13px;margin-bottom:10px">' + esc(App.error) + '</div>' : '') +
      '<button class="btn btn-accent btn-block" onclick="submitCode()">Accéder à la fiche</button>' +
      '<div class="center" style="margin:22px 0 6px;font-size:12px;color:#c3c8bd">— — —</div>' +
      '<button style="width:100%;text-align:center;background:none;border:none;color:#5b6b5f;font-size:13px;cursor:pointer;padding:8px" onclick="nav(\'adminLogin\')">Accès administrateur (Antoine)</button>' +
    '</div>';
}
function setRoleChoice(r) { App.roleChoice = r; render(); }
function submitCode() {
  var entered = (App.code || "").trim().toUpperCase();
  var player = players.find(function (p) { return p.code.toUpperCase() === entered; });
  if (player) {
    App.error = "";
    App.roleChoice = "joueur";
    App.activePlayerId = player.id;
    nav("player");
    return;
  }
  var clubs = clubsFromPlayers();
  var club = clubs.find(function (c) { return c.code && c.code.toUpperCase() === entered; });
  if (club) {
    App.error = "";
    App.roleChoice = "entraineur";
    App.activeClub = club.club;
    nav("clubHome");
    return;
  }
  App.error = "Code non reconnu. Vérifie auprès d'Antoine.";
  render();
}

function screenAdminLogin() {
  return '<div class="logo-header"><img src="' + LOGO_B64 + '" style="width:64px;height:auto;display:inline-block" alt="Logo Section Excellence Sportive Gace"><div class="app-title">SUIVI SPORT-ÉTUDES</div></div>' +
    '<div style="padding:0 24px 30px">' +
      '<div class="field"><label>Code administrateur</label>' +
        '<input type="password" value="' + esc(App.adminCodeInput) + '" oninput="App.adminCodeInput=this.value">' +
      '</div>' +
      (App.error ? '<div style="color:#B3412E;font-size:13px;margin-bottom:10px">' + esc(App.error) + '</div>' : '') +
      '<button class="btn btn-primary btn-block" onclick="submitAdminLogin()">Se connecter</button>' +
      '<button style="width:100%;text-align:center;background:none;border:none;color:#5b6b5f;font-size:13px;cursor:pointer;padding:12px" onclick="nav(\'welcome\')">Retour</button>' +
    '</div>';
}
function submitAdminLogin() {
  if ((App.adminCodeInput || "").trim() === info.adminCode) { App.error = ""; nav("adminHome"); }
  else { App.error = "Code administrateur incorrect."; render(); }
}

/* ============ RENDER PRINCIPAL ============ */
function render() {
  var body;
  switch (App.screen) {
    case "welcome": body = screenWelcome(); break;
    case "adminLogin": body = screenAdminLogin(); break;
    case "player": body = screenPlayerHome(false); break;
    case "adminPlayer": body = screenPlayerHome(true); break;
    case "clubHome": body = screenClubHome(); break;
    case "adminHome": body = screenAdminHome(); break;
    case "adminPlanning": body = screenAdminPlanning(); break;
    case "adminInfos": body = screenAdminInfos(); break;
    case "adminBulkSemaine": body = screenAdminBulkSemaine(); break;
    case "adminBulkMatch": body = screenAdminBulkMatch(); break;
    case "adminBulkDate": body = screenAdminBulkDate(); break;
    case "adminEducateurAvis": body = screenAdminEducateurAvis(); break;
    case "adminImport": body = screenAdminImport(); break;
    default: body = screenWelcome();
  }
  var banner = "";
  if (!navigator.onLine) {
    banner = '<div class="offline-banner">📡 Hors ligne — tes données sont enregistrées sur cet appareil, elles seront envoyées dès que la connexion revient.</div>';
  } else if (syncQueue.length > 0) {
    banner = '<div class="sync-banner" id="sync-badge">⏳ ' + syncQueue.length + ' en attente d\'envoi</div>';
  }
  document.getElementById("shell").innerHTML = banner + body;
}

/* ============ PLAYER HOME (fiche joueur, tous rôles) ============ */
var PH_TABS = [
  { key: "identite", label: "Identité", icon: "⚽" },
  { key: "planning", label: "Planning", icon: "📅" },
  { key: "general", label: "Infos", icon: "ℹ️" },
  { key: "seance", label: "Ma séance", icon: "🎯" },
  { key: "semaine", label: "Ma semaine", icon: "🗓️" },
  { key: "hooperJeudi", label: "Hooper (jeudi)", icon: "📅" },
  { key: "matchSection", label: "Match section", icon: "📋" },
  { key: "hooperWeekend", label: "Hooper (w-e)", icon: "🛏️" },
  { key: "medical", label: "Médical", icon: "📏" },
  { key: "tests", label: "Tests", icon: "⏱️" },
];

function openPlayer(playerId, adminFlag) {
  App.activePlayerId = playerId;
  App.tab = "identite";
  nav(adminFlag ? "adminPlayer" : "player");
}
function setPHTab(key) { App.tab = key; resetDraft({}); render(); }

function exitPlayer() {
  App.activePlayerId = null;
  if (App.screen === "player") {
    if (App.activeClub) nav("clubHome"); else { App.code = ""; nav("welcome"); }
  } else {
    nav("adminHome");
  }
}

function screenPlayerHome(isAdmin) {
  var player = players.find(function (p) { return p.id === App.activePlayerId; });
  if (!player) return screenWelcome();
  var role = isAdmin ? "admin" : App.roleChoice;
  var roleLabel = isAdmin ? "Vue administrateur" : (role === "joueur" ? "Vue joueur" : "Vue éducateur");
  var pdata = getPlayerData(player.id);
  if (!App.tab) App.tab = "identite";

  var tabsHtml = PH_TABS.map(function (t) {
    return '<button class="' + (App.tab === t.key ? "active" : "") + '" onclick="setPHTab(\'' + t.key + '\')"><span class="icon">' + t.icon + '</span>' + t.label + '</button>';
  }).join("");

  var content = "";
  switch (App.tab) {
    case "identite": content = tabIdentite(player, isAdmin, role); break;
    case "planning": content = tabPlanning(isAdmin); break;
    case "general": content = tabGeneral(isAdmin); break;
    case "seance": content = tabSeance(player, pdata, isAdmin, role); break;
    case "semaine": content = tabSemaine(player, pdata, isAdmin, role); break;
    case "hooperJeudi": content = tabHooperJeudi(player, pdata, isAdmin, role); break;
    case "matchSection": content = tabMatchSection(player, pdata, isAdmin, role); break;
    case "hooperWeekend": content = tabHooperWeekend(player, pdata, isAdmin, role); break;
    case "medical": content = tabMedical(player, pdata, isAdmin, role); break;
    case "tests": content = tabTests(player, pdata, isAdmin, role); break;
  }

  return '<div class="header">' +
      '<div><div class="title">' + esc(player.prenom) + " " + esc(player.nom) + '</div><div class="sub">' + esc(roleLabel) + '</div></div>' +
      '<div style="display:flex;align-items:center">' + refreshButtonHtml() + '<button class="btn-header" onclick="exitPlayer()">' + (isAdmin ? "Retour" : "Quitter") + '</button></div>' +
    '</div>' +
    '<div style="flex:1;padding:14px;background:var(--bg)">' + content + '</div>' +
    '<div class="tabbar">' + tabsHtml + '</div>';
}

/* ============ DEMARRAGE ============ */
// Hors-ligne ou sans URL de synchro : on applique tout de suite (comportement d'origine).
// En ligne : on tente d'abord de récupérer les données déjà partagées par les autres appareils,
// pour éviter qu'un nouvel appareil ne régénère ses propres codes/semaines en double.
if (SYNC_URL && navigator.onLine) {
  nav("welcome");
  syncOnLoad();
} else {
  runMigrationsAndEnsure();
  nav("welcome");
}
</script>
</body>
</html>
