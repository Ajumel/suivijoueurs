var SYNC_URL = "";

/* ============ STOCKAGE LOCAL + SYNCHRO ============ */
var syncQueue = JSON.parse(localStorage.getItem("sef-sync-queue") || "[]");
function saveQueue() { localStorage.setItem("sef-sync-queue", JSON.stringify(syncQueue)); }

var Storage = {
  get: function (key) {
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  },
  set: function (key, value) {
    localStorage.setItem(key, JSON.stringify(value));
    if (SYNC_URL) {
      syncQueue = syncQueue.filter(function (q) { return q.key !== key; });
      syncQueue.push({ key: key, value: value, ts: Date.now() });
      saveQueue();
      flushQueueSoon();
    }
  },
};

var flushTimer = null;
function flushQueueSoon() {
  if (flushTimer) return;
  flushTimer = setTimeout(function () { flushTimer = null; flushQueue(); }, 800);
}

function flushQueue() {
  if (!SYNC_URL || !navigator.onLine || syncQueue.length === 0) return;
  var item = syncQueue[0];
  fetch(SYNC_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ key: item.key, value: item.value }),
  })
    .then(function (r) { return r.json(); })
    .then(function () {
      syncQueue.shift();
      saveQueue();
      updateSyncBadge();
      if (syncQueue.length > 0) flushQueueSoon();
    })
    .catch(function () {
      updateSyncBadge();
    });
}

function pullFromRemote(key) {
  if (!SYNC_URL || !navigator.onLine) return Promise.resolve(null);
  return fetch(SYNC_URL + "?key=" + encodeURIComponent(key))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data && data.value !== undefined && data.value !== null) {
        var hasPending = syncQueue.some(function (q) { return q.key === key; });
        if (!hasPending) {
          localStorage.setItem(key, JSON.stringify(data.value));
          return data.value;
        }
      }
      return null;
    })
    .catch(function () { return null; });
}

window.addEventListener("online", function () { flushQueue(); render(); });
window.addEventListener("offline", function () { render(); });

function updateSyncBadge() {
  var b = document.getElementById("sync-badge");
  if (b) b.textContent = syncQueue.length > 0 ? "⏳ " + syncQueue.length + " en attente d'envoi" : "";
}

/* ============ HELPERS ============ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function pad2(n) { return String(n).padStart(2, "0"); }
function todayIso() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

var JOURS_LETTRE = ["L", "M", "M", "J", "V", "S", "D"];
function fmtShort(iso) {
  if (!iso) return "";
  var p = iso.split("-");
  var d = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
  return d.getUTCDate() + " " + MOIS_FR[d.getUTCMonth()];
}
function addDaysIso(iso, n) {
  var p = iso.split("-");
  var d = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
  d.setUTCDate(d.getUTCDate() + n);
  return d.getUTCFullYear() + "-" + pad2(d.getUTCMonth() + 1) + "-" + pad2(d.getUTCDate());
}
function mondayOf(iso) {
  var p = iso.split("-");
  var d = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
  var day = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - day);
  return d.getUTCFullYear() + "-" + pad2(d.getUTCMonth() + 1) + "-" + pad2(d.getUTCDate());
}
function sundayOf(iso) { return addDaysIso(mondayOf(iso), 6); }
function weekdayOfIso(iso) {
  var p = iso.split("-");
  return new Date(Date.UTC(+p[0], +p[1] - 1, +p[2])).getUTCDay(); // 0=dim...6=sam
}
function stripAccents(s) { return (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }
function cleanNamePart(s) { return stripAccents(s || "").replace(/[^a-zA-Z]/g, ""); }
function randomDigits4() { return String(Math.floor(Math.random() * 10000)).padStart(4, "0"); }
function generateCode(name) {
  var base = cleanNamePart(name);
  var nice = base.charAt(0).toUpperCase() + base.slice(1).toLowerCase();
  return nice + randomDigits4();
}
function byNomPrenom(a, b) {
  return a.nom.localeCompare(b.nom, "fr") || a.prenom.localeCompare(b.prenom, "fr");
}
function latestOf(list) {
  if (!list || list.length === 0) return null;
  var s = list.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
  return s[0];
}

})();

var SpeechCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
var activeRecognition = null;
function micHtml(fieldName) {
  if (!SpeechCtor) return "";
  return '<button type="button" class="mic-btn" id="mic-' + fieldName + '" onclick="toggleMic(\'' + fieldName + '\')" title="Dicter avec le micro">🎤</button>';
}
function toggleMic(fieldName) {
  var ta = document.getElementById("f-" + fieldName);
  var btn = document.getElementById("mic-" + fieldName);
  if (!ta) return;
  if (activeRecognition && activeRecognition._field === fieldName) {
    activeRecognition.stop();
    return;
  }
  if (activeRecognition) activeRecognition.stop();
  var rec = new SpeechCtor();
  rec._field = fieldName;
  rec.lang = "fr-FR";
  rec.continuous = true;
  rec.interimResults = true;
  var base = ta.value || "";
  rec.onresult = function (event) {
    var finalT = "", interim = "";
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalT += t; else interim += t;
    }
    if (finalT) base = (base ? base + " " : "") + finalT.trim();
    ta.value = base + (interim ? " " + interim : "");
    ta.dispatchEvent(new Event("input", { bubbles: true }));
  };
  rec.onend = function () { if (btn) btn.classList.remove("listening"); activeRecognition = null; };
  rec.onerror = function () { if (btn) btn.classList.remove("listening"); activeRecognition = null; };
  activeRecognition = rec;
  rec.start();
  if (btn) btn.classList.add("listening");
}
function voiceTextarea(fieldName, value, placeholder, extraAttrs) {
  return '<div class="voice-wrap"><textarea id="f-' + fieldName + '" ' + (extraAttrs || "") +
    ' placeholder="' + esc(placeholder || "") + '" oninput="draftSet(\'' + fieldName + '\', this.value)">' + esc(value) + '</textarea>' +
    micHtml(fieldName) + '</div>';
}

function buildFullCalendar() {
  var start = SCHOOL_WEEKS[0][0], end = SCHOOL_WEEKS[SCHOOL_WEEKS.length - 1][1];
  var byDate = {};
  (info.programmation || []).forEach(function (e) { byDate[e.date] = e; });
  var days = [], currentTheme = "", d = start, safety = 0;
  while (d <= end && safety < 400) {
    if (byDate[d] && byDate[d].theme) currentTheme = byDate[d].theme;
    days.push({ date: d, theme: currentTheme, evenement: (byDate[d] && byDate[d].evenement) || "", heure: (byDate[d] && byDate[d].heure) || "" });
    d = addDaysIso(d, 1);
    safety++;
  }
  return days;
}
function groupByMonth(days) {
  var groups = [], cur = null;
  days.forEach(function (day) {
    var p = day.date.split("-");
    var key = p[0] + "-" + p[1];
    if (!cur || cur.key !== key) { cur = { key: key, year: +p[0], month: +p[1] - 1, days: [] }; groups.push(cur); }
    cur.days.push(day);
  });
  return groups;
}

    var pdata = App.bulk.data[p.id];
    pdata.hooperLundi.forEach(function (e) {
      if (e.resumeMatchCoach || e.commentaireDivers) items.push({ player: p, entry: e });
    });
  });
  items.sort(function (a, b) { return a.entry.date < b.entry.date ? 1 : -1; });
  var weekGroups = [];
  items.forEach(function (item) {
    var ws = mondayOf(item.entry.date), we = sundayOf(item.entry.date);
    var group = weekGroups.find(function (g) { return g.weekStart === ws; });
    if (!group) { group = { weekStart: ws, weekEnd: we, items: [] }; weekGroups.push(group); }
    group.items.push(item);
  });

  var html = '<div class="header"><div class="title">Avis des éducateurs</div><button class="btn-header" onclick="nav(\'adminHome\')">Retour</button></div>' +
    '<div style="flex:1;padding:14px;background:var(--bg);overflow-y:auto">' +
    '<div class="card-gold" style="border-radius:10px;padding:12px"><div style="font-size:12px;color:#7A1420">Tous les avis laissés par les éducateurs, classés par semaine. Réponds directement ici.</div></div>';

  if (weekGroups.length === 0) html += '<div class="empty">Aucun avis d\'éducateur pour l\'instant.</div>';
  weekGroups.forEach(function (g) {
    html += '<div style="font-size:12px;font-weight:800;color:var(--noir);margin:14px 2px 8px;text-transform:uppercase">Semaine du ' + fmtShort(g.weekStart) + ' au ' + fmtShort(g.weekEnd) + '</div>';
    g.items.forEach(function (item) {
      var p = item.player, e = item.entry;
      html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
        '<div style="font-weight:700;color:#1C2620;font-size:14px">' + esc(p.prenom) + " " + esc(p.nom) + '</div><div style="font-size:11px;color:var(--gris)">' + fmtShort(e.date) + '</div></div>' +
        '<div style="background:#f7f8f4;border-radius:8px;padding:8px;font-size:13px;color:#334036;margin-bottom:8px">' +
        (e.resumeMatchCoach ? '<div><b>Résumé :</b> ' + esc(e.resumeMatchCoach) + '</div>' : "") + (e.commentaireDivers ? '<div><b>Commentaire :</b> ' + esc(e.commentaireDivers) + '</div>' : "") + '</div>' +
        '<div style="font-size:11px;font-weight:700;color:var(--rouge);margin-bottom:4px">TA RÉPONSE</div>' +
        '<div class="voice-wrap"><textarea style="min-height:50px" oninput="setBulkHooperReponse(\'' + p.id + '\',\'' + e.id + '\',this.value)">' + esc(e.reponseAdmin || "") + '</textarea></div></div>';
    });
  });
  html += '</div>';
  return html;
}

/* ============ ECRAN : ACCUEIL ============ */
function screenWelcome() {
  return '' +
    '<div class="logo-header">' +
      '<div class="emoji">⚽</div>' +
      '<div class="app-title">SUIVI SPORT-ÉTUDES</div>' +
      '<div class="app-sub">Collège Jean Moulin — Gacé</div>' +
    '</div>' +
    '<div style="padding:0 24px 30px">' +
      '<div class="row" style="margin-bottom:18px">' +
        '<button class="pill ' + (App.roleChoice === "joueur" ? "active" : "") + '" style="flex:1" onclick="setRoleChoice(\'joueur\')">Joueur</button>' +
        '<button class="pill ' + (App.roleChoice === "entraineur" ? "active" : "") + '" style="flex:1" onclick="setRoleChoice(\'entraineur\')">Éducateur</button>' +
      '</div>' +
      '<div class="field"><label>Code d\'accès (joueur, ou code club pour un éducateur)</label>' +
        '<input type="text" id="code-input" style="text-transform:uppercase;letter-spacing:1px" placeholder="Ex : Arnold1234 ou Argentan5678" value="' + esc(App.code) + '" oninput="App.code=this.value">' +
      '</div>' +
      (App.error ? '<div style="color:#B3412E;font-size:13px;margin-bottom:10px">' + esc(App.error) + '</div>' : '') +
      '<button class="btn btn-accent btn-block" onclick="submitCode()">Accéder à la fiche</button>' +
      '<div class="center" style="margin:22px 0 6px;font-size:12px;color:#c3c8bd">— — —</div>' +
      '<button style="width:100%;text-align:center;background:none;border:none;color:#5b6b5f;font-size:13px;cursor:pointer;padding:8px" onclick="nav(\'adminLogin\')">Accès administrateur (Antoine)</button>' +
    '</div>';
}
function setRoleChoice(r) { App.roleChoice = r; render(); }
function submitCode() {
  var entered = (App.code || "").trim().toUpperCase();
  var player = players.find(function (p) { return p.code.toUpperCase() === entered; });
  if (player) {
    App.error = "";
    App.roleChoice = "joueur";
    App.activePlayerId = player.id;
    nav("player");
    return;
  }
  var clubs = clubsFromPlayers();
  var club = clubs.find(function (c) { return c.code && c.code.toUpperCase() === entered; });
  if (club) {
    App.error = "";
    App.roleChoice = "entraineur";
    App.activeClub = club.club;
    nav("clubHome");
    return;
  }
  App.error = "Code non reconnu. Vérifie auprès d'Antoine.";
  render();
}

function screenAdminLogin() {
  return '<div class="logo-header"><div class="emoji">⚽</div><div class="app-title">SUIVI SPORT-ÉTUDES</div></div>' +
    '<div style="padding:0 24px 30px">' +
      '<div class="field"><label>Code administrateur</label>' +
        '<input type="password" value="' + esc(App.adminCodeInput) + '" oninput="App.adminCodeInput=this.value">' +
      '</div>' +
      (App.error ? '<div style="color:#B3412E;font-size:13px;margin-bottom:10px">' + esc(App.error) + '</div>' : '') +
      '<button class="btn btn-primary btn-block" onclick="submitAdminLogin()">Se connecter</button>' +
      '<button style="width:100%;text-align:center;background:none;border:none;color:#5b6b5f;font-size:13px;cursor:pointer;padding:12px" onclick="nav(\'welcome\')">Retour</button>' +
    '</div>';
}
function submitAdminLogin() {
  if ((App.adminCodeInput || "").trim() === info.adminCode) { App.error = ""; nav("adminHome"); }
  else { App.error = "Code administrateur incorrect."; render(); }
}

/* ============ RENDER PRINCIPAL ============ */
function render() {
  var body;
  switch (App.screen) {
    case "welcome": body = screenWelcome(); break;
    case "adminLogin": body = screenAdminLogin(); break;
    case "player": body = screenPlayerHome(false); break;
    case "adminPlayer": body = screenPlayerHome(true); break;
    case "clubHome": body = screenClubHome(); break;
    case "adminHome": body = screenAdminHome(); break;
    case "adminPlanning": body = screenAdminPlanning(); break;
    case "adminInfos": body = screenAdminInfos(); break;
    case "adminBulkSemaine": body = screenAdminBulkSemaine(); break;
    case "adminBulkMatch": body = screenAdminBulkMatch(); break;
    case "adminBulkDate": body = screenAdminBulkDate(); break;
    case "adminEducateurAvis": body = screenAdminEducateurAvis(); break;
    default: body = screenWelcome();
  }
  var banner = "";
  if (!navigator.onLine) {
    banner = '<div class="offline-banner">📡 Hors ligne — tes données sont enregistrées sur cet appareil, elles seront envoyées dès que la connexion revient.</div>';
  } else if (syncQueue.length > 0) {
    banner = '<div class="sync-banner" id="sync-badge">⏳ ' + syncQueue.length + ' en attente d\'envoi</div>';
  }
  document.getElementById("shell").innerHTML = banner + body;
}

/* ============ PLAYER HOME (fiche joueur, tous rôles) ============ */
var PH_TABS = [
  { key: "identite", label: "Identité", icon: "⚽" },
  { key: "planning", label: "Planning", icon: "📅" },
  { key: "general", label: "Infos", icon: "ℹ️" },
  { key: "seance", label: "Ma séance", icon: "🎯" },
  { key: "semaine", label: "Ma semaine", icon: "🗓️" },
  { key: "hooperJeudi", label: "Hooper (jeudi)", icon: "📅" },
  { key: "matchSection", label: "Match section", icon: "📋" },
  { key: "hooperWeekend", label: "Hooper (w-e)", icon: "🛏️" },
  { key: "medical", label: "Médical", icon: "📏" },
  { key: "tests", label: "Tests", icon: "⏱️" },
];

function openPlayer(playerId, adminFlag) {
  App.activePlayerId = playerId;
  App.tab = "identite";
  nav(adminFlag ? "adminPlayer" : "player");
}
function setPHTab(key) { App.tab = key; resetDraft({}); render(); }

function exitPlayer() {
  App.activePlayerId = null;
  if (App.screen === "player") {
    if (App.activeClub) nav("clubHome"); else { App.code = ""; nav("welcome"); }
  } else {
    nav("adminHome");
  }
}

function screenPlayerHome(isAdmin) {
  var player = players.find(function (p) { return p.id === App.activePlayerId; });
  if (!player) return screenWelcome();
  var role = isAdmin ? "admin" : App.roleChoice;
  var roleLabel = isAdmin ? "Vue administrateur" : (role === "joueur" ? "Vue joueur" : "Vue éducateur");
  var pdata = getPlayerData(player.id);
  if (!App.tab) App.tab = "identite";

  var tabsHtml = PH_TABS.map(function (t) {
    return '<button class="' + (App.tab === t.key ? "active" : "") + '" onclick="setPHTab(\'' + t.key + '\')"><span class="icon">' + t.icon + '</span>' + t.label + '</button>';
  }).join("");

  var content = "";
  switch (App.tab) {
    case "identite": content = tabIdentite(player, isAdmin, role); break;
    case "planning": content = tabPlanning(isAdmin); break;
    case "general": content = tabGeneral(isAdmin); break;
    case "seance": content = tabSeance(player, pdata, isAdmin, role); break;
    case "semaine": content = tabSemaine(player, pdata, isAdmin, role); break;
    case "hooperJeudi": content = tabHooperJeudi(player, pdata, isAdmin, role); break;
    case "matchSection": content = tabMatchSection(player, pdata, isAdmin, role); break;
    case "hooperWeekend": content = tabHooperWeekend(player, pdata, isAdmin, role); break;
    case "medical": content = tabMedical(player, pdata, isAdmin, role); break;
    case "tests": content = tabTests(player, pdata, isAdmin, role); break;
  }

  return '<div class="header">' +
      '<div><div class="title">' + esc(player.prenom) + " " + esc(player.nom) + '</div><div class="sub">' + esc(roleLabel) + '</div></div>' +
      '<button class="btn-header" onclick="exitPlayer()">' + (isAdmin ? "Retour" : "Quitter") + '</button>' +
    '</div>' +
    '<div style="flex:1;padding:14px;background:var(--bg)">' + content + '</div>' +
    '<div class="tabbar">' + tabsHtml + '</div>';
}

/* ============ DEMARRAGE ============ */
nav("welcome");
</script>
</body>
</html>
